<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bitcoin Block Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&family=Teko:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0700; --amber:#f7931a; --amber-dim:#7a4a0d;
    --red:#ff4444; --green:#39ff14; --yellow:#f7c31a;
    --text:#e8c87a; --muted:#6b4f1e;
    --panel:rgba(247,147,26,0.04); --divider:rgba(247,147,26,0.18);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow:hidden;user-select:none;-webkit-user-select:none;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.8) 100%);pointer-events:none;z-index:100;}
  body::after{content:'';position:fixed;inset:-50%;width:200%;height:200%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:99;opacity:.35;animation:grain .5s steps(1) infinite;}
  @keyframes grain{0%{transform:translate(0,0)}25%{transform:translate(-2%,2%)}50%{transform:translate(1%,-3%)}75%{transform:translate(-1%,2%)}100%{transform:translate(0,0)}}
  .scanline{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(247,147,26,.12),transparent);animation:scan 10s linear infinite;z-index:101;pointer-events:none;}
  @keyframes scan{0%{top:-2px;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:100%;opacity:0}}

  .wrap{position:relative;z-index:10;width:100vw;height:100vh;display:grid;grid-template-columns:1fr 1px 1fr;grid-template-rows:auto 1fr auto;}

  /* TOP */
  .top-bar{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:12px 28px 10px;border-bottom:1px solid var(--divider);background:linear-gradient(180deg,rgba(247,147,26,.05) 0%,transparent 100%);}
  .brand{font-family:'Black Ops One',cursive;font-size:15px;color:var(--amber);letter-spacing:5px;text-shadow:0 0 20px rgba(247,147,26,.5);opacity:.75;}
  .top-center{font-size:11px;letter-spacing:3px;color:var(--muted);}
  .live-badge{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);letter-spacing:2px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s ease-in-out infinite;}
  .live-dot.error{background:var(--red);box-shadow:0 0 8px var(--red);animation:none;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  /* DIVIDER */
  .divider{grid-row:2/4;background:var(--divider);position:relative;}
  .divider::before{content:'₿';font-family:'Black Ops One',cursive;font-size:18px;color:var(--amber-dim);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);padding:8px 4px;text-shadow:0 0 20px rgba(247,147,26,.3);}

  /* LEFT */
  .left{grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 40px 16px 28px;gap:14px;}
  .block-label{font-size:10px;letter-spacing:6px;color:var(--muted);text-transform:uppercase;}
  .block-height{font-family:'Teko',sans-serif;font-weight:300;font-size:clamp(80px,14vw,140px);line-height:.85;color:var(--amber);text-shadow:0 0 40px rgba(247,147,26,.55),0 0 100px rgba(247,147,26,.15);letter-spacing:-2px;transition:color .4s,text-shadow .4s;}
  .block-height.new-block{animation:flash 1.4s ease forwards;}
  @keyframes flash{0%{color:#fff;text-shadow:0 0 80px #fff,0 0 160px var(--amber)}50%{color:var(--amber);text-shadow:0 0 60px rgba(247,147,26,.8)}100%{color:var(--amber);text-shadow:0 0 40px rgba(247,147,26,.55),0 0 100px rgba(247,147,26,.15)}}

  .tension-wrap{width:100%;max-width:340px;}
  .tension-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
  .tension-meta .elapsed{font-size:14px;color:var(--text);font-family:'Teko',sans-serif;letter-spacing:1px;}
  .tension-track{height:8px;background:rgba(247,147,26,.06);border:1px solid var(--amber-dim);overflow:hidden;position:relative;}
  .tension-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transition:width 1s linear,background 1s;position:relative;}
  .tension-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:24px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35));}
  .tension-fill.overdue{background:linear-gradient(90deg,#7a1a1a,var(--red));animation:redpulse 1.5s ease-in-out infinite;}
  @keyframes redpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .tension-ticks{display:flex;justify-content:space-between;margin-top:4px;}
  .tension-tick{font-size:9px;color:var(--muted);letter-spacing:1px;}

  /* RIGHT */
  .right{grid-row:2;display:flex;flex-direction:column;justify-content:center;padding:16px 28px 16px 40px;gap:14px;}
  .price-row{padding-bottom:12px;border-bottom:1px solid var(--divider);}
  .price-label{font-size:9px;letter-spacing:4px;color:var(--muted);margin-bottom:2px;}
  .price-val{font-family:'Teko',sans-serif;font-size:clamp(38px,6vw,62px);font-weight:600;line-height:1;color:var(--amber);text-shadow:0 0 24px rgba(247,147,26,.4);transition:all .4s;}
  .price-change{font-size:13px;letter-spacing:1px;margin-top:2px;}
  .price-change.up{color:var(--green);}
  .price-change.down{color:var(--red);}

  .fees-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .fee-cell{background:var(--panel);border:1px solid rgba(247,147,26,.08);padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;}
  .fee-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--amber-dim),transparent);}
  .fee-key{font-size:9px;letter-spacing:2px;color:var(--muted);}
  .fee-val{font-family:'Teko',sans-serif;font-size:clamp(28px,4.5vw,46px);font-weight:400;line-height:1;}
  .fee-val.fast{color:var(--red);}
  .fee-val.mid{color:var(--yellow);}
  .fee-val.slow{color:var(--green);}
  .fee-unit{font-size:9px;color:var(--muted);letter-spacing:1px;}

  .bottom-right{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;}
  .mempool-cell{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--panel);border:1px solid rgba(247,147,26,.08);padding:10px 8px;}
  .mempool-key{font-size:9px;letter-spacing:2px;color:var(--muted);}
  .mempool-val{font-family:'Teko',sans-serif;font-size:clamp(26px,4vw,42px);font-weight:400;line-height:1;color:var(--amber);}
  .mempool-unit{font-size:9px;color:var(--muted);letter-spacing:1px;}

  .epoch-cell{display:flex;flex-direction:column;gap:5px;}
  .epoch-key{font-size:9px;letter-spacing:2px;color:var(--muted);}
  .epoch-track{height:5px;background:rgba(247,147,26,.06);border:1px solid var(--amber-dim);}
  .epoch-fill{height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transition:width 1s ease;}
  .epoch-meta{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);letter-spacing:1px;}

  /* BOTTOM */
  .bottom-bar{grid-column:1/-1;display:flex;justify-content:center;align-items:center;padding:8px 28px;border-top:1px solid var(--divider);font-size:10px;color:rgba(107,79,30,.5);letter-spacing:2px;}

  /* LOADER */
  .loader{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .8s ease;}
  .loader.hidden{opacity:0;pointer-events:none;}
  .loader-symbol{font-family:'Black Ops One',cursive;font-size:72px;color:var(--amber);text-shadow:0 0 40px rgba(247,147,26,.6);animation:lpulse 1.5s ease-in-out infinite;}
  @keyframes lpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.93)}}
  .loader-text{font-size:11px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;}

  .error-banner{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,68,68,.12);border:1px solid var(--red);color:var(--red);font-size:11px;letter-spacing:2px;padding:8px 24px;z-index:150;}
  .error-banner.show{display:block;}
  .tap-hint{position:fixed;bottom:10px;right:20px;font-size:9px;color:rgba(107,79,30,.35);letter-spacing:2px;z-index:50;}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="loader" id="loader">
  <div class="loader-symbol">₿</div>
  <div class="loader-text">Syncing to the chain...</div>
</div>
<div class="error-banner" id="errBanner">⚠ API UNREACHABLE — RETRYING</div>
<div class="tap-hint">TAP TO REFRESH</div>

<div class="wrap">
  <div class="top-bar">
    <div class="brand">BLOCK CLOCK</div>
    <div class="top-center" id="dateTime">—</div>
    <div class="live-badge">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveLabel">LIVE</span>
    </div>
  </div>

  <div class="left">
    <div class="block-label">CURRENT BLOCK</div>
    <div class="block-height" id="blockHeight">———</div>
    <div class="tension-wrap">
      <div class="tension-meta">
        <span>LAST BLOCK</span>
        <span class="elapsed" id="elapsed">—</span>
      </div>
      <div class="tension-track">
        <div class="tension-fill" id="tensionFill"></div>
      </div>
      <div class="tension-ticks">
        <span class="tension-tick">0m</span>
        <span class="tension-tick">5m</span>
        <span class="tension-tick">10m</span>
        <span class="tension-tick">20m</span>
        <span class="tension-tick">30m+</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <div class="price-row">
      <div class="price-label">BTC / USD</div>
      <div class="price-val" id="btcPrice">—</div>
      <div class="price-change" id="priceChange"></div>
    </div>
    <div class="fees-grid">
      <div class="fee-cell">
        <div class="fee-key">FAST</div>
        <div class="fee-val fast" id="feeFast">—</div>
        <div class="fee-unit">SAT/VB</div>
      </div>
      <div class="fee-cell">
        <div class="fee-key">STANDARD</div>
        <div class="fee-val mid" id="feeMid">—</div>
        <div class="fee-unit">SAT/VB</div>
      </div>
      <div class="fee-cell">
        <div class="fee-key">ECO</div>
        <div class="fee-val slow" id="feeSlow">—</div>
        <div class="fee-unit">SAT/VB</div>
      </div>
    </div>
    <div class="bottom-right">
      <div class="mempool-cell">
        <div class="mempool-key">MEMPOOL</div>
        <div class="mempool-val" id="mempool">—</div>
        <div class="mempool-unit">UNCONF TXS</div>
      </div>
      <div class="epoch-cell">
        <div class="epoch-key">HALVING EPOCH</div>
        <div class="epoch-track"><div class="epoch-fill" id="epochFill" style="width:0%"></div></div>
        <div class="epoch-meta">
          <span id="epochPct">—%</span>
          <span id="epochBlocks">— to halving</span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    UPDATED <span id="lastUpdate" style="margin:0 6px">—</span> · AUTO-REFRESH 30s · mempool.space
  </div>
</div>

<script>
  const HALVING=210000;
  let lastBlockHeight=null,lastBlockTime=null,tickInterval=null,priceCache=null;
  function fmt(n){return n.toLocaleString('en-US');}
  function updateClock(){
    const now=new Date();
    document.getElementById('dateTime').textContent=
      now.toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}).toUpperCase()+
      '  '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  function startTick(){
    if(tickInterval)clearInterval(tickInterval);
    tickInterval=setInterval(()=>{updateElapsed();updateClock();},1000);
  }
  function updateElapsed(){
    if(!lastBlockTime)return;
    const elapsed=Math.floor(Date.now()/1000)-lastBlockTime;
    const m=Math.floor(elapsed/60),s=elapsed%60;
    document.getElementById('elapsed').textContent=`${m}m ${String(s).padStart(2,'0')}s`;
    const pct=Math.min((elapsed/1800)*100,100);
    const fill=document.getElementById('tensionFill');
    fill.style.width=pct+'%';
    fill.classList.toggle('overdue',elapsed>1800);
  }
  async function fetchAll(){
    try{
      const [blockRes,feesRes,mempoolRes,priceRes]=await Promise.all([
        fetch('https://mempool.space/api/blocks/tip/height'),
        fetch('https://mempool.space/api/v1/fees/recommended'),
        fetch('https://mempool.space/api/mempool'),
        fetch('https://mempool.space/api/v1/prices')
      ]);
      const blockHeight=await blockRes.json();
      const fees=await feesRes.json();
      const mempool=await mempoolRes.json();
      const price=await priceRes.json();

      const hashRes=await fetch(`https://mempool.space/api/block-height/${blockHeight}`);
      const hash=(await hashRes.text()).trim();
      const blockData=await fetch(`https://mempool.space/api/block/${hash}`);
      const block=await blockData.json();
      lastBlockTime=block.timestamp;

      const isNew=lastBlockHeight!==null&&blockHeight>lastBlockHeight;
      lastBlockHeight=blockHeight;
      const hEl=document.getElementById('blockHeight');
      hEl.textContent=fmt(blockHeight);
      if(isNew){hEl.classList.remove('new-block');void hEl.offsetWidth;hEl.classList.add('new-block');}

      document.getElementById('feeFast').textContent=fees.fastestFee;
      document.getElementById('feeMid').textContent=fees.halfHourFee;
      document.getElementById('feeSlow').textContent=fees.economyFee;

      const uc=mempool.count;
      document.getElementById('mempool').textContent=uc>=1000?(uc/1000).toFixed(1)+'K':uc;

      const into=blockHeight%HALVING,remaining=HALVING-into;
      const epochPct=(into/HALVING*100).toFixed(1);
      document.getElementById('epochPct').textContent=epochPct+'%';
      document.getElementById('epochFill').style.width=epochPct+'%';
      document.getElementById('epochBlocks').textContent=fmt(remaining)+' blks';

      const usd=price.USD,prev=priceCache;
      priceCache=usd;
      document.getElementById('btcPrice').textContent='$'+fmt(usd);
      if(prev!==null){
        const diff=usd-prev,pctC=((diff/prev)*100).toFixed(2);
        const el=document.getElementById('priceChange');
        el.textContent=diff>=0?`▲ ${pctC}%`:`▼ ${Math.abs(pctC)}%`;
        el.className='price-change '+(diff>=0?'up':'down');
      }

      document.getElementById('lastUpdate').textContent=
        new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('liveDot').classList.remove('error');
      document.getElementById('liveLabel').textContent='LIVE';
      document.getElementById('errBanner').classList.remove('show');
      document.getElementById('loader').classList.add('hidden');
      updateElapsed();updateClock();startTick();
    }catch(e){
      console.error(e);
      document.getElementById('liveDot').classList.add('error');
      document.getElementById('liveLabel').textContent='ERR';
      document.getElementById('errBanner').classList.add('show');
      document.getElementById('loader').classList.add('hidden');
    }
  }
  fetchAll();
  setInterval(fetchAll,30000);
  document.body.addEventListener('click',fetchAll);
  updateClock();
</script>
</body>
</html>
